# Mirix Configuration - v6 graph (lean entity index)
# Same model setup as 0201c. Switch graph_version=v6 via env var:
#   MIRIX_ENABLE_GRAPH_MEMORY=true MIRIX_GRAPH_VERSION=v6

llm_config:
  model: "gpt-4.1-mini"
  model_endpoint_type: "openai"
  api_key: your-api-key
  model_endpoint: "https://api.openai.com/v1"
  context_window: 128000

topic_extraction_llm_config:
  model: "gpt-4.1-nano"
  model_endpoint_type: "openai"
  api_key: your-api-key
  model_endpoint: "https://api.openai.com/v1"
  context_window: 128000

embedding_config:
  embedding_model: "text-embedding-3-small"
  embedding_endpoint: "https://api.openai.com/v1"
  api_key: your-api-key
  embedding_endpoint_type: "openai"
  embedding_dim: 1536

build_embeddings_for_memory: true

meta_agent_config:
  system_prompts_folder: prompts/0201a/
  agents:
    - core_memory_agent
    - resource_memory_agent
    - semantic_memory_agent
    - episodic_memory_agent
    - procedural_memory_agent
    - knowledge_vault_memory_agent
  memory:
    core:
      - label: "human"
        value: ""
      - label: "persona"
        value: "I am a helpful assistant."
