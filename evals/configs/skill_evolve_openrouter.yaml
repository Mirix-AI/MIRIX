# Mirix Configuration - OpenRouter Setup (for skill-evolve evaluation)
# Uses OpenRouter API with OPENROUTER_API_KEY from .env

llm_config:
  model: "anthropic/claude-haiku-4.5"
  model_endpoint_type: "openrouter"
  api_key: your-api-key
  model_endpoint: "https://openrouter.ai/api/v1"
  context_window: 128000

topic_extraction_llm_config:
  model: "anthropic/claude-haiku-4.5"
  model_endpoint_type: "openrouter"
  api_key: your-api-key
  model_endpoint: "https://openrouter.ai/api/v1"
  context_window: 128000

embedding_config:
  embedding_model: "google/gemini-embedding-001"
  embedding_endpoint: "https://openrouter.ai/api/v1"
  api_key: your-api-key
  embedding_endpoint_type: "openrouter"
  embedding_dim: 3072

build_embeddings_for_memory: true

meta_agent_config:
  system_prompts_folder: prompts/0201a/
  agents:
    - core_memory_agent
    - resource_memory_agent
    - semantic_memory_agent
    - episodic_memory_agent
    - procedural_memory_agent
    - knowledge_vault_memory_agent
  memory:
    core:
      - label: "human"
        value: ""
      - label: "persona"
        value: "I am a helpful assistant."
