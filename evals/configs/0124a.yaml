# Mirix Configuration - OpenAI Setup
# Simple configuration using OpenAI's GPT-4o-mini

llm_config:
  model: "gpt-4.1-mini"
  model_endpoint_type: "openai"
  api_key: your-api-key
  model_endpoint: "http://14.103.68.46/v1"
  context_window: 128000

topic_extraction_llm_config:
  model: "gpt-4.1-nano"
  model_endpoint_type: "openai"
  api_key: your-api-key
  model_endpoint: "http://14.103.68.46/v1"
  context_window: 128000
  
build_embeddings_for_memory: false

meta_agent_config:
  system_prompts_folder: mirix\prompts\system\base
  agents:
    - core_memory_agent
    - resource_memory_agent
    - semantic_memory_agent
    - episodic_memory_agent
    - procedural_memory_agent
    - knowledge_memory_agent
    - reflexion_agent
    - background_agent
  memory:
    core:
      - label: "human"
        value: ""
      - label: "persona"
        value: "I am a helpful assistant."
